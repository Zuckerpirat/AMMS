services:
  amms:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: amms:dev
    container_name: amms
    env_file:
      - path: .env
        required: false
    volumes:
      - amms-data:/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      AMMS_CONFIG_PATH: /app/config.yaml
    command: ["run"]
    restart: unless-stopped

volumes:
  amms-data:
