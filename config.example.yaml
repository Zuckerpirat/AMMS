# Copy to config.yaml and edit. Watchlist is small on purpose for the MVP.

watchlist:
  - AAPL
  - MSFT
  - NVDA
  - AMD
  - TSLA
  - META
  - GOOGL
  - AMZN

strategy:
  name: sma_cross
  params:
    fast: 10
    slow: 30

risk:
  max_open_positions: 5
  max_position_pct: 0.02
  daily_loss_pct: -0.03
  blackout_minutes_after_open: 5
  blackout_minutes_before_close: 5
  # Optional. Caps how many buys a single tick may submit. With the composite
  # strategy, the highest-scoring signals win. Comment out to disable.
  # max_buys_per_tick: 3

scheduler:
  tick_seconds: 60
  timezone: America/New_York
